<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
    }

    .eye-container {
  width: 400px;
  height: 200px;
  overflow: hidden;

  /* Eye shape with soft edges */
  -webkit-mask-image: radial-gradient(ellipse at center,
    black 60%,
    transparent 100%
  );

  mask-image: radial-gradient(ellipse at center,
    black 60%,
    transparent 100%
  );
}
    
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* optional mirror */
    }
  </style>
</head>
<body>

  <div class="eye-container">
    <video id="cam" autoplay playsinline></video>
  </div>

  <script>
    const video = document.getElementById("cam");

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
      })
      .catch(err => console.error(err));
  </script>

</body>
</html>
