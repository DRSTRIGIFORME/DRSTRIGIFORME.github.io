<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HANDS</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
  }

  .bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background-image: url("../miscimages/flesh.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    animation: pulse 5s infinite ease-in-out;
    z-index: -1;
  }

  @keyframes pulse {
    0%, 100% {
      transform: scale(1);
    }
    50% {
      transform: scale(1.3);
    }
  }
</style>
</head>

<body>

<div class="bg"></div>

</body>
</html>
