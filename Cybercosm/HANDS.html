<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HANDS</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: black;
  }

  .bg {
    position: fixed;
    width: 100%;
    height: 100%;

    background-image: url("../miscimages/flesh.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    animation: pulse 9s infinite ease-in-out;
    z-index: -2;
  }

  @keyframes pulse {
    0%   { transform: scale(1); filter: brightness(1); }
    35%  { transform: scale(1.03); filter: brightness(1.2); }
    70%  { transform: scale(1); filter: brightness(1); }
    100% { transform: scale(1); filter: brightness(1); }
  }

  #teeth {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    width: 300px;

    opacity: 0;
    z-index: 1;

    transition: opacity 2s ease;

    animation: teethPulse 9s infinite ease-in-out;
  }

  @keyframes teethPulse {
    0%   { transform: translate(-50%, -50%) scale(1); }
    35%  { transform: translate(-50%, -50%) scale(1.01); }
    70%  { transform: translate(-50%, -50%) scale(1); }
    100% { transform: translate(-50%, -50%) scale(1); }
  }

  #teeth.show {
    opacity: 1;
  }

  #orb {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    width: 500px;
    height: 200px;

    background: radial-gradient(ellipse,
      rgba(255,255,255,0.4) 0%,
      rgba(255,255,255,0.15) 40%,
      transparent 70%
    );

    filter: blur(20px);

    opacity: 0;
    pointer-events: none;

    z-index: 2;

    animation: orbBreath 9s infinite ease-in-out;
  }

  @keyframes orbBreath {
    0%   { opacity: 0; }
    30%  { opacity: 0; }
    45%  { opacity: 0.7; }
    65%  { opacity: 0.2; }
    100% { opacity: 0; }
  }
</style>
</head>

<body>

<div class="bg"></div>

<a href="EARS.html">
  <img id="teeth" src="../miscimages/teeth.png">
</a>
<div id="orb"></div>

<script>
  setTimeout(() => {
    document.getElementById("teeth").classList.add("show");
  }, 10000);
</script>

</body>
</html>
